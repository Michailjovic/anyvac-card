<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  hui-view-container, hui-view, hui-panel-view, hui-card-options { display: block; }
  hui-view-container, hui-view, hui-panel-view { height: 100%; }
  #cardWrap { display: block; }
</style>
</head>
<body>
<hui-view-container>
  <hui-view>
  </hui-view>
</hui-view-container>
<script type="module">
  // Minimal mock of the HA internal DOM anyvac-card actually sits inside:
  // hui-view-container > hui-view > hui-panel-view (shadow root) > ... >
  // the card. Real HA elements are far more complex; this harness only
  // reproduces the two structural facts the card's layout code (docs/21)
  // depends on: (1) arbitrary shadow-root nesting between the card and the
  // page, and (2) edit-mode reparenting the card into a `hui-card-options`
  // wrapper without necessarily resizing the card's own box or firing any
  // event.

  class HuiPanelView extends HTMLElement {
    constructor() {
      super();
      const root = this.attachShadow({ mode: "open" });
      const slot = document.createElement("div");
      slot.id = "cardSlot";
      slot.style.display = "block";
      root.appendChild(slot);
    }
  }
  customElements.define("hui-panel-view", HuiPanelView);

  class HuiCardOptions extends HTMLElement {
    constructor() {
      super();
      const root = this.attachShadow({ mode: "open" });
      // Real HA renders an actions bar (move/edit/delete) here — it has
      // real height, but doesn't change the card's own width/height, which
      // is precisely the case ResizeObserver(this) can miss (docs/21 §5b).
      // Real HA renders this toolbar BELOW the card (a following sibling in
      // the wrapper's shadow tree), not above it — the card's own top
      // position is unaffected; only the room available for its pinned
      // height shrinks. Order here matters: get it backwards and a test
      // built on this mock would "prove" a double-reservation bug that
      // isn't real (caught empirically while building this harness).
      const slot = document.createElement("slot");
      root.appendChild(slot);
      // docs/21 §5b third follow-up: the bar is NOT auto-mounted here — a
      // constructor can't see attributes set by the caller right after
      // `createElement` (they land after construction), so callers mount it
      // explicitly (enterEdit()) or defer it (enterEditColdBar() +
      // mountLateActionsBar()) to simulate the bar's real first-paint being
      // slower than the reparenting mutation itself (observed live: hard
      // refresh -> first edit toggle -> bar not there yet).
    }
    _mountBar() {
      if (this.shadowRoot.querySelector(".card-actions")) return;
      const actions = document.createElement("div");
      actions.className = "card-actions";
      actions.textContent = "MOVE / EDIT / DELETE";
      // docs/21 §5b third follow-up (confirmed live 2026-07-17 on a real HA
      // dashboard): the real actions bar does NOT appear at its full height
      // instantly — it CSS-transitions in. A single measurement taken right
      // when the element first mounts (height still 0/mid-transition) can
      // permanently under-reserve space, since nothing else naturally
      // re-triggers a remeasure once the transition finishes (`_cardW`/
      // `_profile` don't change from this). Reproduce that here instead of
      // an instant height, so a test can tell a one-shot mutation-triggered
      // remeasure apart from one that also tracks the bar's OWN resizing.
      actions.style.height = "0px";
      actions.style.overflow = "hidden";
      actions.style.transition = "height 80ms linear";
      this.shadowRoot.appendChild(actions);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { actions.style.height = "32px"; });
      });
    }
  }
  customElements.define("hui-card-options", HuiCardOptions);

  const view = document.querySelector("hui-view");
  const panelView = document.createElement("hui-panel-view");
  view.appendChild(panelView);
  const cardSlot = panelView.shadowRoot.getElementById("cardSlot");

  // Sibling BEFORE cardWrap whose height a test can grow later, to
  // simulate late-loading content (fonts/images finishing after first
  // paint) shifting the card's position WITHOUT any DOM mutation on the
  // trees our MutationObserver watches and WITHOUT resizing the card's own
  // box (so ResizeObserver(this) can't catch it either) — docs/21 §5b
  // follow-up settle-timer scenario.
  const aboveSpacer = document.createElement("div");
  aboveSpacer.id = "aboveSpacer";
  aboveSpacer.style.height = "0px";
  cardSlot.appendChild(aboveSpacer);

  // Container the test controls the width/height of, to simulate the card
  // NOT spanning the full window (two-up cards, sections view, sidebar...).
  const cardWrap = document.createElement("div");
  cardWrap.id = "cardWrap";
  cardSlot.appendChild(cardWrap);

  window.__mockHa = {
    panelView,
    cardSlot,
    cardWrap,
    aboveSpacer,
    /** Reparent whatever is in cardWrap into a hui-card-options wrapper, IN
     *  PLACE (same parent chain) — matches real HA edit-mode behavior. */
    enterEdit() {
      const card = cardWrap.firstElementChild;
      if (!card) return;
      const wrapper = document.createElement("hui-card-options");
      wrapper._mountBar();
      cardWrap.removeChild(card);
      wrapper.appendChild(card);
      cardWrap.appendChild(wrapper);
    },
    exitEdit() {
      const wrapper = cardWrap.querySelector("hui-card-options");
      if (!wrapper) return;
      const card = wrapper.firstElementChild;
      wrapper.removeChild(card);
      cardWrap.removeChild(wrapper);
      cardWrap.appendChild(card);
    },
    /** docs/21 §5b third follow-up: same reparenting as enterEdit(), but the
     *  actions bar does NOT mount yet — call mountLateActionsBar() to
     *  simulate it finishing its (slower, cold) first paint afterwards. */
    enterEditColdBar() {
      const card = cardWrap.firstElementChild;
      if (!card) return null;
      const wrapper = document.createElement("hui-card-options");
      cardWrap.removeChild(card);
      wrapper.appendChild(card);
      cardWrap.appendChild(wrapper);
      return wrapper;
    },
    mountLateActionsBar() {
      const wrapper = cardWrap.querySelector("hui-card-options");
      if (wrapper) wrapper._mountBar();
    },
  };
  window.__mockHaReady = true;
</script>
<script type="module" src="/dist/anyvac-card.js"></script>
</body>
</html>
